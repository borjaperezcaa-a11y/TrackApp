name: CI

on:
  pull_request:
  push:
    branches: [main]

# Si llega un push nuevo al mismo PR/rama, cancela la ejecución anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test
        env:
          # Si el repo tiene configurados estos secrets (Settings → Secrets →
          # Actions), los tests de aislamiento RLS se ejecutan contra el proyecto
          # de PRUEBAS. Si no, se omiten solos (describe.skip) y el resto corre.
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_A_EMAIL: ${{ secrets.TEST_A_EMAIL }}
          TEST_A_PASSWORD: ${{ secrets.TEST_A_PASSWORD }}
          TEST_B_EMAIL: ${{ secrets.TEST_B_EMAIL }}
          TEST_B_PASSWORD: ${{ secrets.TEST_B_PASSWORD }}

      - name: Build
        run: npm run build
        env:
          # Placeholders: el build no conecta con Supabase (las consultas son en
          # tiempo de petición, no de compilación). Solo evitan que falte la var.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
